<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Unsupported Browser</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
      body {
        background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .navbar {
        background: rgba(255, 255, 255, 0.1) !important;
        backdrop-filter: blur(10px);
      }
      
      .navbar-brand {
        font-weight: 700;
      }
      
      .error-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      
      .error-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
      }
      
      .error-code {
        font-size: 5rem;
        font-weight: 900;
        background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }
      
      .error-icon {
        font-size: 4rem;
        color: #a8edea;
        margin-bottom: 1.5rem;
      }
      
      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 1rem;
      }
      
      .error-message {
        color: #666;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      
      .browser-list {
        list-style: none;
        padding: 0;
        margin: 2rem 0;
      }
      
      .browser-list li {
        display: inline-block;
        margin: 0.5rem;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 10px;
        min-width: 100px;
      }
      
      .browser-list i {
        font-size: 2rem;
        display: block;
        margin-bottom: 0.5rem;
      }
      
      .browser-list span {
        font-size: 0.875rem;
        font-weight: 600;
        color: #666;
      }
      
      .btn-home {
        background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        border: none;
        padding: 0.75rem 2rem;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      
      .btn-home:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(168, 237, 234, 0.4);
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="bi bi-layers-half"></i> mini<span style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CMS</span>
        </a>
      </div>
    </nav>

    <!-- Error Content -->
    <div class="error-container">
      <div class="error-card">
        <div class="error-icon">
          <i class="bi bi-browser-chrome"></i>
        </div>
        <h1 class="error-title">Browser Not Supported</h1>
        <p class="error-message">
          We're sorry, but your browser is not supported. Please use one of the 
          following modern browsers for the best experience:
        </p>
        
        <ul class="browser-list">
          <li>
            <i class="bi bi-browser-chrome" style="color: #4285F4;"></i>
            <span>Chrome</span>
          </li>
          <li>
            <i class="bi bi-browser-firefox" style="color: #FF7139;"></i>
            <span>Firefox</span>
          </li>
          <li>
            <i class="bi bi-browser-safari" style="color: #1890FF;"></i>
            <span>Safari</span>
          </li>
          <li>
            <i class="bi bi-browser-edge" style="color: #0078D7;"></i>
            <span>Edge</span>
          </li>
        </ul>
        
        <div class="d-grid gap-2">
          <a href="/" class="btn btn-home btn-lg">
            <i class="bi bi-house-door"></i> Go Home
          </a>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
