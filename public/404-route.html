<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Route Not Found</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .navbar {
        background: rgba(255, 255, 255, 0.1) !important;
        backdrop-filter: blur(10px);
      }
      
      .navbar-brand {
        font-weight: 700;
      }
      
      .error-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      
      .error-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
      }
      
      .error-code {
        font-size: 8rem;
        font-weight: 900;
        color: #667eea;
        line-height: 1;
        margin-bottom: 1rem;
      }
      
      .error-icon {
        font-size: 4rem;
        color: #764ba2;
        margin-bottom: 1.5rem;
      }
      
      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 1rem;
      }
      
      .error-message {
        color: #666;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      
      .requested-path {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 1rem;
        margin: 1.5rem 0;
        font-family: monospace;
        color: #764ba2;
        font-size: 0.9rem;
        word-break: break-all;
      }
      
      .btn-home {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        padding: 0.75rem 2rem;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      
      .btn-home:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }
      
      .quick-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-top: 2rem;
      }
      
      .quick-link {
        display: block;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 10px;
        text-decoration: none;
        color: #333;
        transition: all 0.2s;
      }
      
      .quick-link:hover {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        transform: translateY(-2px);
      }
      
      .quick-link i {
        display: block;
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      
      .quick-link span {
        font-size: 0.875rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="bi bi-layers-half"></i> mini<span style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CMS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/posts"><i class="bi bi-file-text"></i> Posts</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/sign_in"><i class="bi bi-box-arrow-in-right"></i> Sign In</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/sign_up"><i class="bi bi-person-plus"></i> Sign Up</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Error Content -->
    <div class="error-container">
      <div class="error-card">
        <div class="error-icon">
          <i class="bi bi-signpost-2"></i>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Route Not Found</h1>
        <p class="error-message">
          Oops! There's no page at this address. The URL might be misspelled 
          or the page doesn't exist.
        </p>
        
        <div class="requested-path">
          <i class="bi bi-link-45deg"></i> 
          <span id="requested-url"></span>
        </div>
        
        <div class="d-grid gap-2">
          <a href="/" class="btn btn-home btn-lg">
            <i class="bi bi-house-door"></i> Go Home
          </a>
        </div>
        
        <div class="quick-links">
          <a href="/posts" class="quick-link">
            <i class="bi bi-journal"></i>
            <span>Browse Posts</span>
          </a>
          <a href="/users/sign_in" class="quick-link">
            <i class="bi bi-box-arrow-in-right"></i>
            <span>Sign In</span>
          </a>
          <a href="/users/sign_up" class="quick-link">
            <i class="bi bi-person-plus"></i>
            <span>Sign Up</span>
          </a>
          <a href="/favorites" class="quick-link">
            <i class="bi bi-star"></i>
            <span>Favorites</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Show the requested URL -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const urlElement = document.getElementById('requested-url');
        if (urlElement) {
          urlElement.textContent = window.location.pathname;
        }
      });
    </script>
  </body>
</html>
