<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Server Error (500)</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
      body {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .navbar {
        background: rgba(255, 255, 255, 0.1) !important;
        backdrop-filter: blur(10px);
      }
      
      .navbar-brand {
        font-weight: 700;
      }
      
      .error-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      
      .error-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
      }
      
      .error-code {
        font-size: 8rem;
        font-weight: 900;
        color: #f5576c;
        line-height: 1;
        margin-bottom: 1rem;
      }
      
      .error-icon {
        font-size: 4rem;
        color: #f093fb;
        margin-bottom: 1.5rem;
      }
      
      .error-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 1rem;
      }
      
      .error-message {
        color: #666;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      
      .btn-home {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        border: none;
        padding: 0.75rem 2rem;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      
      .btn-home:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
      }
      
      .btn-outline-light {
        border-color: rgba(255, 255, 255, 0.5);
        color: rgba(255, 255, 255, 0.9);
      }
      
      .btn-outline-light:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.8);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="bi bi-layers-half"></i> mini<span style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CMS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/posts"><i class="bi bi-file-text"></i> Posts</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/sign_in"><i class="bi bi-box-arrow-in-right"></i> Sign In</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/sign_up"><i class="bi bi-person-plus"></i> Sign Up</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Error Content -->
    <div class="error-container">
      <div class="error-card">
        <div class="error-icon">
          <i class="bi bi-exclamation-triangle"></i>
        </div>
        <div class="error-code">500</div>
        <h1 class="error-title">Internal Server Error</h1>
        <p class="error-message">
          Oops! Something went wrong on our end. We're working to fix it. 
          Please try again in a few moments.
        </p>
        <div class="d-grid gap-2">
          <a href="/" class="btn btn-home btn-lg">
            <i class="bi bi-house-door"></i> Go Home
          </a>
          <a href="javascript:location.reload()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> Try Again
          </a>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
